spring:
  application:
    name: isb-hibah-discretionary-gift

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  isb:
    serviceDomain: "Hibah Discretionary Gift"
    businessArea: "Deposits and Investment Accounts"
    businessDomain: "Profit Management"
    functionalPattern: "Process"
    assetType: "Hibah Award"
    controlRecord: "Hibah Award Procedure"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
